runtime:
  seed: 2026
  device: "cpu"
  cpu_threads: 18
  dtype: "float32"

geometry:
  x_min: 0.0
  x_max: 360.0
  y_min: 0.0
  y_max: 150.0
  srv_x_min: 180.0
  srv_x_max: 360.0
  srv_y_min: 37.5
  srv_y_max: 112.5
  main_frac_x_min: 198.387
  main_frac_x_max: 360.0
  main_frac_y_min: 74.995
  main_frac_y_max: 75.005
  secondary_fractures:
    - [333.0545, 333.0645, 46.077375, 103.922625]
    - [306.1190, 306.1290, 46.077375, 103.922625]
    - [279.1835, 279.1935, 46.077375, 103.922625]
    - [252.2480, 252.2580, 46.077375, 103.922625]
    - [225.3125, 225.3225, 46.077375, 103.922625]
  dirichlet_segment:
    x0: 360.0
    y0: 74.995
    x1: 360.0
    y1: 75.005

mesh:
  nx: 180
  ny: 150

time_grid:
  times_days: [0,1,2,5,10,20,50,100,200,300,400,500,1000]

physics:
  mode: "rdfm_ipinn"
  seconds_per_day: 86400.0
  Fai:
    HF: 0.1
    SRV: 0.05
    USRV: 0.05
  D1:
    HF: 1.0
    SRV: 1.0e-7
    USRV: 1.0e-9
  D2:
    HF: 1.0
    SRV: 9.95e-8
    USRV: 9.9e-10
  anisotropy_y_1: 1.0
  anisotropy_y_2: 1.0

boundary:
  P_t0: 25.0
  P_out: 3.0
  C13_C12: 0.010900084
  decay_rate: 0.018
  pressure_normalization: "component_affine"

model:
  input_dim: 2
  output_dim: 2
  hidden_layers: 4
  hidden_units: 256
  activation: "relu"

training:
  epochs_per_step: 20000
  learning_rate: 5.0e-4
  grad_clip_norm: 10.0
  fracture_residual_weight: 1.0
  main_fracture_residual_weight: 10.0
  normalize_residual_by_row_sum: true
  print_every: 1000
  save_each_step: true

solver:
  pcg_tolerance: 1.0e-7
  pcg_max_iterations: 2000

evaluation:
  times: [1.0, 10.0, 100.0, 500.0, 1000.0]

paths:
  outputs: "outputs"
  checkpoints: "outputs/checkpoints"
  figures: "outputs/figures"
  logs: "outputs/logs"
  tables: "outputs/tables"
  data: "data"
